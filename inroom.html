<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Kanit', 'Tahoma', sans-serif;
            padding: 40px;
            background-color: #ffffff;
            color: #333;
        }

        table {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            border-collapse: collapse;
            border-top: 4px solid #FF8C00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        th {
            background-color: #fcfcfc;
            color: #333;
            padding: 20px 10px;
            border-bottom: 2px solid #FF8C00;
            border-right: 1px solid #eee;
        }

        .floor-header {
            width: 28%;
            text-align: center;
        }

        .floor-name {
            display: block;
            font-size: 1.25em;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 4px;
        }

        .room-subtitle {
            display: block;
            font-size: 0.7em;
            font-weight: 500;
            color: #777;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            line-height: 1.4;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            border-right: 1px solid #eee;
            text-align: center;
        }

        /* คอลัมน์รายการสิ่งของ */
        td:first-child {
            text-align: left;
            width: 44%;
            background-color: #fafafa;
            color: #444;
        }

        /* ปิดเส้นขอบขวาสุดของตารางในทุกแถว */
        td:last-child, th:last-child {
            border-right: none;
        }

        /* แถวสุดท้ายของตาราง */
        tr:last-child td {
            border-bottom: 2px solid #FF8C00;
        }

        .bold-item {
            font-weight: bold;
            color: #222;
        }

        .check-icon {
            color: #FF8C00;
            font-size: 1.2em;
        }

        .cross-icon {
            color: #ddd;
            font-size: 1em;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th style="text-align: left; padding-left: 20px;">รายการสิ่งอำนวยความสะดวก</th>
                <th class="floor-header">
                    <span class="floor-name">ชั้น 1</span>
                    <span class="room-subtitle">DELUXE TWIN ROOM /<br>DELUXE QUEEN ROOM</span>
                </th>
                <th class="floor-header">
                    <span class="floor-name">ชั้น 2</span>
                    <span class="room-subtitle">STANDARD QUEEN ROOM</span>
                </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>น้ำเปล่า, ชา, กาแฟ</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="check-icon">✔</span></td>
            </tr>
            <tr>
                <td>เครื่องทำน้ำอุ่น</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="check-icon">✔</span></td>
            </tr>
            <tr>
                <td>ผ้าเช็ดตัวผืนใหญ่</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="check-icon">✔</span></td>
            </tr>
            <tr>
                <td>หมวกคลุมผม, คัตตอนบัด</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="check-icon">✔</span></td>
            </tr>
            <tr>
                <td>สบู่, ยาสระผม</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="check-icon">✔</span></td>
            </tr>
            <tr>
                <td class="bold-item">ผ้าเช็ดตัวผืนเล็ก</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="cross-icon">✘</span></td>
            </tr>
            <tr>
                <td class="bold-item">ไดร์เป่าผม</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="cross-icon">✘</span></td>
            </tr>
            <tr>
                <td class="bold-item">แปรงสีฟัน</td>
                <td><span class="check-icon">✔</span></td>
                <td><span class="cross-icon">✘</span></td>
            </tr>
        </tbody>
    </table>

</body>
</html>
