<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองห้องพัก เปรม อู่ทอง (Prem U Thong)</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); max-width: 450px; margin: auto; }
        h2 { color: #00b900; text-align: center; margin-bottom: 10px; }
        .user-info { display: flex; align-items: center; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 8px; font-weight: bold; border: 1px solid #eee; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; }
        
        .section-title { font-weight: bold; margin: 15px 0 10px; color: #555; border-left: 4px solid #00b900; padding-left: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        
        .room-item { background: #fffcf5; padding: 15px; border-radius: 10px; border: 1px solid #ffecb3; margin-bottom: 12px; position: relative; }
        .btn-remove { position: absolute; right: 8px; top: 8px; color: #ff5252; font-size: 24px; cursor: pointer; line-height: 1; }
        .btn-add { background: #fff; color: #00b900; border: 2px dashed #00b900; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        
        .result { background: #e8f5e9; padding: 12px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: bold; color: #2e7d32; border: 1px dashed #2e7d32; }
        .btn-submit { width: 100%; padding: 15px; background-color: #00b900; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,185,0,0.3); }
        
        /* สไตล์เพิ่มเติมสำหรับจำนวนคนและเตียงเสริม */
        .room-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .checkbox-group { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; }
        .checkbox-group input { width: 18px; height: 18px; margin: 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="user-info">
        <img id="userImg" src="" style="display:none;">
        <span id="userName">กำลังโหลดข้อมูล...</span>
    </div>
    
    <h2>จองที่พัก เปรม อู่ทอง</h2>
    
    <div class="section-title">📞 ข้อมูลผู้เข้าพัก</div>
    <div class="input-group">
        <label>ชื่อผู้เข้าพัก:</label>
        <input type="text" id="customName" placeholder="ระบุชื่อที่จะใช้จอง">
    </div>
    <div class="input-group">
        <label>เบอร์โทรศัพท์ติดต่อ:</label>
        <input type="tel" id="userPhone" placeholder="ระบุเบอร์โทรศัพท์" maxlength="10">
    </div>

    <div class="section-title">📅 เลือกวันที่เข้าพัก</div>
    <div class="input-group">
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>วันที่เช็คอิน:</label>
                <input type="date" id="checkin" onchange="calculateNights()">
            </div>
            <div style="flex: 1;">
                <label>วันที่เช็คเอาท์:</label>
                <input type="date" id="checkout" onchange="calculateNights()">
            </div>
        </div>
    </div>

    <div class="section-title">🏨 รายละเอียดห้องพัก</div>
    <div id="roomContainer"></div>
    <button class="btn-add" onclick="addRoom()">+ เพิ่มห้องพัก</button>

    <div id="nightCount" class="result" style="display:none;">
        รวมระยะเวลา: <span id="nights">0</span> คืน
    </div>

    <button class="btn-submit" onclick="sendBooking()">ยืนยันการจอง</button>
</div>

<script>
    let userDisplayName = "";
    const roomOptions = [
        "ห้องดีลักซ์ เตียงคู่ (Deluxe Twin)", 
        "ห้องดีลักซ์ เตียงใหญ่ (Deluxe Queen)", 
        "ห้องมาตรฐาน เตียงใหญ่ (Standard Queen)"
    ];

    window.onload = function() {
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        const minDate = `${y}-${m}-${d}`;

        document.getElementById('checkin').min = minDate;
        document.getElementById('checkout').min = minDate;

        const savedName = localStorage.getItem('prem_saved_name');
        const savedPhone = localStorage.getItem('prem_saved_phone');
        if (savedName) document.getElementById('customName').value = savedName;
        if (savedPhone) document.getElementById('userPhone').value = savedPhone;
        
        addRoom(); 
    };

    function addRoom() {
        const container = document.getElementById('roomContainer');
        const div = document.createElement('div');
        div.className = 'room-item';
        
        let optionsHtml = roomOptions.map(r => `<option value="${r}">${r}</option>`).join('');
        
        div.innerHTML = `
            <span class="btn-remove" onclick="removeRoom(this)">×</span>
            <label>ประเภทห้อง:</label>
            <select class="room-select">${optionsHtml}</select>
            
            <div class="room-row">
                <div style="flex: 1;">
                    <label>จำนวนคน (สูงสุด 2):</label>
                    <input type="number" class="guest-count" value="1" min="1" max="2">
                </div>
                <div style="flex: 1.2; padding-top: 20px;">
                    <label class="checkbox-group">
                        <input type="checkbox" class="extra-bed"> เตียงเสริม
                    </label>
                </div>
            </div>
        `;
        container.appendChild(div);
    }

    function removeRoom(btn) {
        const items = document.querySelectorAll('.room-item');
        if(items.length > 1) {
            btn.parentElement.remove();
        } else {
            alert("ต้องเลือกอย่างน้อย 1 ห้องครับ");
        }
    }

    async function main() {
        try {
            await liff.init({ liffId: "2009627657-wXRtQW7E" }); 
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userDisplayName = profile.displayName;
                document.getElementById('userName').innerText = "LINE: " + userDisplayName;
                if (profile.pictureUrl) {
                    const img = document.getElementById('userImg');
                    img.src = profile.pictureUrl;
                    img.style.display = "block";
                }
            } else {
                liff.login();
            }
        } catch (err) { console.error(err); }
    }
    main();

    function calculateNights() {
        const cin = document.getElementById('checkin').value;
        const cout = document.getElementById('checkout').value;
        const resultDiv = document.getElementById('nightCount');
        
        if (cin && cout) {
            const d1 = new Date(cin);
            const d2 = new Date(cout);
            const diff = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
            
            if (diff > 0) {
                document.getElementById('nights').innerText = diff;
                resultDiv.style.display = 'block';
            } else {
                resultDiv.style.display = 'none';
            }
        }
    }

    function sendBooking() {
        const customName = document.getElementById('customName').value;
        const phone = document.getElementById('userPhone').value;
        const cin = document.getElementById('checkin').value;
        const cout = document.getElementById('checkout').value;
        const nights = document.getElementById('nights').innerText;
        const roomItems = document.querySelectorAll('.room-item');
        
        if (!customName) { alert("กรุณาระบุชื่อผู้เข้าพัก"); return; }
        if (!phone || phone.length < 9) { alert("กรุณาระบุเบอร์โทรศัพท์"); return; }
        if (!cin || !cout || parseInt(nights) <= 0) { alert("กรุณาเลือกวันที่เข้าพัก"); return; }

        localStorage.setItem('prem_saved_name', customName);
        localStorage.setItem('prem_saved_phone', phone);

        let roomText = "";
        roomItems.forEach((item, index) => {
            const type = item.querySelector('.room-select').value;
            const guests = item.querySelector('.guest-count').value;
            const hasExtraBed = item.querySelector('.extra-bed').checked ? " (+เตียงเสริม)" : "";
            roomText += `${index + 1}. ${type}\n   └ พัก ${guests} ท่าน${hasExtraBed}\n`;
        });

        const dmyCin = cin.split('-').reverse().join('/');
        const dmyCout = cout.split('-').reverse().join('/');
        
        const msg = `🔔 แจ้งจองที่พักใหม่!\n👤 ชื่อ: ${customName}\n📞 โทร: ${phone}\n📅 เช็คอิน: ${dmyCin}\n📅 เช็คเอาท์: ${dmyCout}\n🌙 จำนวน: ${nights} คืน\n🏨 รายละเอียด:\n${roomText}`;

        liff.sendMessages([{ type: 'text', text: msg }]).then(() => {
            liff.closeWindow();
        }).catch(err => alert("เกิดข้อผิดพลาด: " + err));
    }
</script>

</body>
</html>
