<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองห้องพัก เปรม อู่ทอง</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); max-width: 450px; margin: auto; }
        h2 { color: #FF6800; text-align: center; margin-bottom: 10px; }
        
        .user-info { display: flex; align-items: center; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 8px; font-weight: bold; border: 1px solid #eee; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; }
        
        .section-title { font-weight: bold; margin: 15px 0 10px; color: #555; border-left: 4px solid #FF6800; padding-left: 10px; }
        .section-title span { font-size: 13px; color: #888; font-weight: normal; margin-left: 5px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        
        /* แก้ไขระยะห่างวันที่ให้เสถียรขึ้น */
        .date-container { display: flex; } 
        .date-container > div { flex: 1; }
        .date-container > div:first-child { margin-right: 15px; } /* เว้นช่องว่างระหว่างวันเช็คอิน-เอาท์ */

        .room-item { background: #fffcf5; padding: 15px; border-radius: 10px; border: 1px solid #ffecb3; margin-bottom: 12px; position: relative; }
        .btn-remove { position: absolute; right: 8px; top: 8px; color: #ff5252; font-size: 24px; cursor: pointer; line-height: 1; }
        .btn-add { background: #fff; color: #FF6800; border: 2px dashed #FF6800; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        
        .result { background: #fff3e0; padding: 12px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: bold; color: #e65100; border: 1px dashed #FF6800; }
        .btn-submit { width: 100%; padding: 15px; background-color: #FF6800; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(255,104,0,0.3); }
        
        .room-row { display: flex; gap: 10px; margin-top: 10px; align-items: flex-start; }
        .checkbox-group { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; }
        .checkbox-group input { width: 18px; height: 18px; margin: 0; }
        .warning-text { color: #ff5252; font-size: 12px; margin-top: 6px; font-weight: bold; display: none; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <div class="user-info">
        <img id="userImg" src="" style="display:none;">
        <span id="userName">กำลัง加載ข้อมูล...</span>
    </div>
    
    <h2>จองที่พัก เปรม อู่ทอง</h2>
    
    <div class="section-title">📞 ข้อมูลผู้เข้าพัก</div>
    <div class="input-group">
        <label>ชื่อผู้เข้าพัก:</label>
        <input type="text" id="customName" placeholder="ระบุชื่อผู้เข้าพัก">
    </div>
    <div class="input-group">
        <label>เบอร์โทรศัพท์ติดต่อ:</label>
        <input type="tel" id="userPhone" placeholder="ระบุเบอร์โทรศัพท์" maxlength="10">
    </div>

    <div class="section-title">📅 เลือกวันที่เข้าพัก</div>
    <div class="input-group">
        <div class="date-container">
            <div>
                <label>วันที่เช็คอิน:</label>
                <input type="date" id="checkin" onchange="calculateNights()">
            </div>
            <div>
                <label>วันที่เช็คเอาท์:</label>
                <input type="date" id="checkout" onchange="calculateNights()">
            </div>
        </div>
    </div>

    <div class="section-title">🏨 รายละเอียดห้องพัก <span>(2 ท่าน/ห้อง)</span></div>
    <div id="roomContainer"></div>
    <button class="btn-add" onclick="addRoom()">+ เพิ่มห้องพัก</button>

    <div id="nightCount" class="result" style="display:none;">
        รวมระยะเวลา: <span id="nights">0</span> คืน
    </div>

    <button class="btn-submit" onclick="sendBooking()">ยืนยันการจอง</button>
</div>

<script>
    // โค้ด Logic เดิมทั้งหมด (ย่อเพื่อความสั้น)
    let userDisplayName = "";
    const roomOptions = ["ห้องดีลักซ์ เตียงคู่ (Deluxe Twin)", "ห้องดีลักซ์ เตียงใหญ่ (Deluxe Queen)", "ห้องมาตรฐาน เตียงใหญ่ (Standard Queen)"];

    window.onload = function() {
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        const minDate = `${y}-${m}-${d}`;
        document.getElementById('checkin').min = minDate;
        document.getElementById('checkout').min = minDate;
        const savedName = localStorage.getItem('prem_saved_name');
        const savedPhone = localStorage.getItem('prem_saved_phone');
        if (savedName) document.getElementById('customName').value = savedName;
        if (savedPhone) document.getElementById('userPhone').value = savedPhone;
        addRoom(); 
    };

    function addRoom() {
        const container = document.getElementById('roomContainer');
        const div = document.createElement('div');
        div.className = 'room-item';
        let optionsHtml = roomOptions.map(r => `<option value="${r}">${r}</option>`).join('');
        div.innerHTML = `<span class="btn-remove" onclick="removeRoom(this)">×</span><label>ประเภทห้อง:</label><select class="room-select">${optionsHtml}</select><div class="room-row"><div style="flex: 1;"><label>จำนวนคน:</label><input type="number" class="guest-count" value="1" min="1" max="4" oninput="checkGuestLimit(this)"><div class="warning-text">กรณีพักเกิน 2 ท่าน โรงแรมขอบริการเตียงเสริมครับ</div></div><div style="flex: 1.2; padding-top: 20px;"><label class="checkbox-group"><input type="checkbox" class="extra-bed"> เตียงเสริม</label></div></div>`;
        container.appendChild(div);
    }

    function checkGuestLimit(input) {
        const warning = input.nextElementSibling;
        const extraBedCheckbox = input.parentElement.nextElementSibling.querySelector('.extra-bed');
        if (parseInt(input.value) > 2) {
            warning.style.display = 'block';
            extraBedCheckbox.checked = true; 
            extraBedCheckbox.disabled = true; 
        } else {
            warning.style.display = 'none';
            extraBedCheckbox.disabled = false; 
        }
    }

    function removeRoom(btn) {
        if(document.querySelectorAll('.room-item').length > 1) btn.parentElement.remove();
        else alert("ต้องเลือกอย่างน้อย 1 ห้องครับ");
    }

    async function main() {
        try {
            await liff.init({ liffId: "2009627657-wXRtQW7E" }); 
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userName').innerText = "LINE: " + profile.displayName;
                if (profile.pictureUrl) {
                    const img = document.getElementById('userImg');
                    img.src = profile.pictureUrl;
                    img.style.display = "block";
                }
            } else { liff.login(); }
        } catch (err) { console.error(err); }
    }
    main();

    function calculateNights() {
        const cin = document.getElementById('checkin').value;
        const cout = document.getElementById('checkout').value;
        if (cin && cout) {
            const diff = Math.ceil((new Date(cout) - new Date(cin)) / (1000 * 60 * 60 * 24));
            if (diff > 0) {
                document.getElementById('nights').innerText = diff;
                document.getElementById('nightCount').style.display = 'block';
            } else {
                document.getElementById('nightCount').style.display = 'none';
            }
        }
    }

    function sendBooking() {
        const customName = document.getElementById('customName').value;
        const phone = document.getElementById('userPhone').value;
        const cin = document.getElementById('checkin').value;
        const cout = document.getElementById('checkout').value;
        const nights = document.getElementById('nights').innerText;
        const roomItems = document.querySelectorAll('.room-item');
        
        if (!customName || !phone || !cin || !cout || parseInt(nights) <= 0) { 
            alert("กรุณากรอกข้อมูลให้ครบถ้วน"); return; 
        }

        let roomText = "";
        roomItems.forEach((item, index) => {
            const type = item.querySelector('.room-select').value;
            const guests = item.querySelector('.guest-count').value;
            const extra = item.querySelector('.extra-bed').checked ? " (+เตียงเสริม)" : "";
            roomText += `${index + 1}. ${type}\n   └ พัก ${guests} ท่าน${extra}\n`;
        });

        localStorage.setItem('prem_saved_name', customName);
        localStorage.setItem('prem_saved_phone', phone);
        const msg = `🔔 แจ้งจองที่พักใหม่!\n👤 ชื่อ: ${customName}\n📞 โทร: ${phone}\n📅 เช็คอิน: ${cin.split('-').reverse().join('/')}\n📅 เช็คเอาท์: ${cout.split('-').reverse().join('/')}\n🌙 จำนวน: ${nights} คืน\n🏨 รายละเอียด:\n${roomText}`;

        liff.sendMessages([{ type: 'text', text: msg }]).then(() => liff.closeWindow()).catch(err => console.error(err));
    }
</script>
</body>
</html>
